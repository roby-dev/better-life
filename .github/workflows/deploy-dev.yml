name: Deploy Dev

on:
  push:
    branches: [dev]
    paths: [apps/api/**]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: true
          tags: ghcr.io/roby-dev/better-life/api:dev

      - name: Stage .env from environment secret
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE }}
        run: |
          printf '%s\n' "$ENV_FILE_CONTENT" > apps/api/.env
          chmod 600 apps/api/.env
          echo "Line count: $(grep -c '=' apps/api/.env) KEY=VALUE pairs detected"
          echo "Keys found (values redacted):"
          cut -d= -f1 apps/api/.env | sed 's/^/  - /'

      - name: Deploy
        run: |
          cd apps/api
          TAG=dev docker compose -f docker-compose.yml -f docker-compose.dev.yml pull
          TAG=dev docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
